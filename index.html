<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nós dois 💖</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <p class="tag">Desde 02 de agosto de 2024</p>
      <h1>Eu e Eduarda 💕</h1>
      <p class="subtitle">Nosso amor em tempo real</p>

      <div class="counter" aria-live="polite">
        <div class="unit">
          <span id="days">0</span>
          <small>dias</small>
        </div>
        <div class="unit">
          <span id="hours">0</span>
          <small>horas</small>
        </div>
        <div class="unit">
          <span id="minutes">0</span>
          <small>minutos</small>
        </div>
        <div class="unit">
          <span id="seconds">0</span>
          <small>segundos</small>
        </div>
      </div>

      <p class="message">Cada segundo com você vale ouro. Te amo, Eduarda. ✨</p>
      <p class="verse">“As muitas águas não poderiam apagar este amor.” — Cantares 8:7</p>

      <section class="letter-zone" aria-label="Carta de amor">
        <button class="letter-open-btn" id="openLetterModal" type="button">Abrir carta 💌</button>

        <div class="letter-modal" id="letterModal" aria-hidden="true">
          <div class="letter-paper" role="dialog" aria-modal="true" aria-labelledby="letterModalTitle">
            <button class="letter-close-btn" id="closeLetterModal" type="button" aria-label="Fechar carta">×</button>
            <h2 id="letterModalTitle">Para Eduarda</h2>
            <div class="letter-content" id="letterContent"></div>
          </div>
        </div>
      </section>

      <section class="gallery" aria-label="Nossas fotos">
        <img src="foto1.jpeg" alt="Foto do casal 1" loading="lazy" />
        <img src="foto2.jpeg" alt="Foto do casal 2" loading="lazy" />
        <img src="foto3.jpeg" alt="Foto do casal 3" loading="lazy" />
        <img src="foto4.jpeg" alt="Foto do casal 4" loading="lazy" />
        <img src="foto5.jpeg" alt="Foto do casal 5" loading="lazy" />
        <img src="foto6.jpeg" alt="Foto do casal 6" loading="lazy" />
      </section>
    </section>
  </main>

  <script src="carta-conteudo.js"></script>
  <script src="script.js"></script>
</body>
</html>
